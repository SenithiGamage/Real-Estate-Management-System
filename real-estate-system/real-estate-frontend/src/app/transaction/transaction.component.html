<div class="transaction-container">
  <h2>💰 Transaction History</h2>

  <div *ngIf="loading" class="loading">Loading transactions...</div>
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <div *ngIf="!loading && transactions.length > 0" class="transactions-grid">
    <table class="transaction-table">
      <thead>
      <tr>
        <th>Date</th>
        <th>Property</th>
        <th>Location</th>
        <th>Price</th>
        <th>Type</th>
        <th>Status</th>
        <th>Customer</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let t of transactions">
        <td>{{ t.date }}</td>
        <td>{{ t.propertyTitle }}</td>
        <td>{{ t.location }}</td>
        <td>Rs. {{ t.price | number }}</td>
        <td>{{ t.type }}</td>
        <td>
          <span class="status status-{{ t.status }}">{{ t.status }}</span>
        </td>
        <td>{{ t.customer }}</td>
      </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading && transactions.length === 0" class="no-data">
    No transactions found yet.
  </div>
</div>
