<div class="inquiry-form">
  <h2>Send Property Inquiry</h2>

  <div *ngIf="submitted" class="success-message">
    ✅ Inquiry Sent Successfully!
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <form (ngSubmit)="onSubmit()">
    <input
      type="text"
      [(ngModel)]="inquiry.customerName"
      name="customerName"
      placeholder="Your Full Name"
      required />

    <input
      type="email"
      [(ngModel)]="inquiry.customerEmail"
      name="customerEmail"
      placeholder="Your Email Address"
      required />

    <textarea
      [(ngModel)]="inquiry.message"
      name="message"
      placeholder="Write your message or requirements here..."
      rows="5"
      required></textarea>

    <button type="submit" class="btn-submit">Send Inquiry</button>
  </form>
</div>
