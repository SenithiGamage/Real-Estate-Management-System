<div class="admin-container">
  <h2>🛠 Admin Panel</h2>

  <div class="admin-section">
    <h3>Property Management</h3>
    <table class="admin-table">
      <thead>
      <tr>
        <th>Title</th>
        <th>Location</th>
        <th>Price</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let p of properties">
        <td>{{ p.title }}</td>
        <td>{{ p.location }}</td>
        <td>Rs. {{ p.price | number }}</td>
        <td>
          <select (change)="updateStatus(p.id, $any($event.target).value)">
            <option value="AVAILABLE">Available</option>
            <option value="SOLD">Sold</option>
            <option value="RENTED">Rented</option>
          </select>
        </td>
        <td>
          <button class="btn-delete" (click)="deleteProperty(p.id)">Delete</button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="admin-section">
    <h3>User Management</h3>
    <p>(Basic User list - Can be expanded)</p>
  </div>
</div>
