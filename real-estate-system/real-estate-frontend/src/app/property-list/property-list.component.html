<div class="property-container">
  <h1>Available Properties ({{ filteredProperties.length }})</h1>

  <!-- Filter Section -->
  <div class="filter-section">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (input)="filterProperties()"
      placeholder="Search by title or location..." />

    <select [(ngModel)]="selectedStatus" (change)="filterProperties()">
      <option value="">All Status</option>
      <option value="AVAILABLE">Available</option>
      <option value="SOLD">Sold</option>
      <option value="RENTED">Rented</option>
    </select>
  </div>

  <div *ngIf="loading" class="loading">Loading properties...</div>
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <!-- Properties Grid -->
  <div class="properties-grid" *ngIf="!loading && filteredProperties.length > 0">
    <div *ngFor="let property of filteredProperties" class="property-card">
      <h3>{{ property.title }}</h3>
      <p><strong>Location:</strong> {{ property.location }}</p>
      <p><strong>Price:</strong> Rs. {{ property.price | number }}</p>
      <p><strong>Type:</strong> {{ property.propertyType }}</p>
      <p><strong>Status:</strong> {{ property.status }}</p>

      <!-- Buttons -->
      <div class="button-group">
        <a [routerLink]="['/properties', property.id]" class="btn-details">View Details</a>
        <button class="btn-inquiry" (click)="sendInquiry(property)">Send Inquiry</button>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && filteredProperties.length === 0" class="no-data">
    No properties found.
  </div>
</div>
