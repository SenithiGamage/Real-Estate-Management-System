server:
  port: 8080

spring:
  application:
    name: real-estate-management

  datasource:
    url: jdbc:mysql://localhost:3306/real_estate_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      encoding: UTF-8

  spring:
    sql:
      init:
        mode: always
        encoding: UTF-8